<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vantage — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="../icons/favicon.svg" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <!-- ═══════════ SIDEBAR ═══════════ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m9 11-6 6v3h9l3-3"/><path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/></svg>
      </span>
      <div>
        <h1 class="logo-text">Vantage</h1>
        <p class="logo-sub">shared pov</p>
      </div>
    </div>

    <!-- Stats -->
    <div class="sidebar-stats">
      <div class="mini-stat"><span id="statHighlights">0</span> annotations</div>
      <div class="mini-stat"><span id="statPages">0</span> pages</div>
      <div class="mini-stat"><span id="statNotes">0</span> notes</div>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      <button class="nav-btn active" data-view="domain">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
        By Domain
      </button>
      <button class="nav-btn" data-view="date">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        By Date
      </button>
      <button class="nav-btn" data-view="all">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>
        All Annotations
      </button>
    </nav>

    <!-- Search -->
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Search annotations..." />
    </div>

    <!-- Domain list -->
    <div class="sidebar-domains" id="domainList"></div>

    <!-- Cloud Pack Status -->
    <div class="sidebar-cloud" id="cloudStatus">
      <div class="cloud-status-header">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
        <span>Shared POV</span>
      </div>
      <div id="cloudStatusContent" class="cloud-status-content">
        <span class="cloud-offline">Not connected</span>
      </div>
    </div>

    <!-- Bottom actions -->
    <div class="sidebar-bottom">
      <button class="sidebar-action" id="btnHarvest">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
        Harvest Markdown
      </button>
      <button class="sidebar-action" id="btnExportPack">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        Export Pack
      </button>
      <button class="sidebar-action" id="btnImportPack">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
        Import Pack
      </button>
      <input type="file" id="fileImport" accept=".json,.cscribe" hidden />
    </div>
  </aside>

  <!-- ═══════════ MAIN CONTENT ═══════════ -->
  <main class="main">
    <header class="topbar">
      <h2 class="topbar-title" id="viewTitle">All Annotations</h2>
      <div class="topbar-actions">
        <button class="topbar-btn theme-toggle-btn" id="themeToggle" title="Toggle theme">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
          <span>Light</span>
        </button>
        <button class="topbar-btn" id="btnSelectAll">Select All</button>
        <button class="topbar-btn danger" id="btnDeleteSelected" disabled>Delete Selected</button>
        <button class="topbar-btn danger" id="btnClearAll" title="Clear all local data and disconnect cloud">Clear All</button>
      </div>
    </header>

    <div class="content" id="content"></div>
  </main>

  <!-- ═══════════ MARKDOWN MODAL ═══════════ -->
  <div class="modal-overlay" id="mdModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Harvested Markdown</h3>
        <button class="modal-close" id="mdClose">&times;</button>
      </div>
      <div class="modal-body">
        <textarea id="mdOutput" readonly></textarea>
      </div>
      <div class="modal-footer">
        <button class="modal-btn" id="mdCopy">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
          Copy
        </button>
        <button class="modal-btn secondary" id="mdDownload">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
          Download .md
        </button>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
