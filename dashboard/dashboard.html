<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context Scribe — Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <!-- ═══════════ SIDEBAR ═══════════ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14"/><path d="M4 19h16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </span>
      <div>
        <h1 class="logo-text">Context Scribe</h1>
        <p class="logo-sub">The Sovereign Scholar</p>
      </div>
    </div>

    <!-- Stats -->
    <div class="sidebar-stats">
      <div class="mini-stat"><span id="statHighlights">0</span> highlights</div>
      <div class="mini-stat"><span id="statPages">0</span> pages</div>
      <div class="mini-stat"><span id="statNotes">0</span> notes</div>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      <button class="nav-btn active" data-view="domain">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        By Domain
      </button>
      <button class="nav-btn" data-view="date">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        By Date
      </button>
      <button class="nav-btn" data-view="all">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        All Highlights
      </button>
    </nav>

    <!-- Search -->
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Search highlights…" />
    </div>

    <!-- Domain list (populated by JS) -->
    <div class="sidebar-domains" id="domainList"></div>

    <!-- Cloud Pack Status -->
    <div class="sidebar-cloud" id="cloudStatus">
      <div class="cloud-status-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
        <span>Cloud Pack</span>
      </div>
      <div id="cloudStatusContent" class="cloud-status-content">
        <span class="cloud-offline">Not connected</span>
      </div>
    </div>

    <!-- Bottom actions -->
    <div class="sidebar-bottom">
      <button class="sidebar-action" id="btnHarvest">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Harvest Markdown
      </button>
      <button class="sidebar-action" id="btnExportPack">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        Export Pack
      </button>
      <button class="sidebar-action" id="btnImportPack">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Import Pack
      </button>
      <input type="file" id="fileImport" accept=".json,.cscribe" hidden />
    </div>
  </aside>

  <!-- ═══════════ MAIN CONTENT ═══════════ -->
  <main class="main">
    <!-- Top Bar -->
    <header class="topbar">
      <h2 class="topbar-title" id="viewTitle">All Highlights</h2>
      <div class="topbar-actions">
        <button class="topbar-btn theme-toggle-btn" id="themeToggle" title="Toggle theme">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <span>Light</span>
        </button>
        <button class="topbar-btn" id="btnSelectAll">Select All</button>
        <button class="topbar-btn danger" id="btnDeleteSelected" disabled>Delete Selected</button>
      </div>
    </header>

    <!-- Content Area -->
    <div class="content" id="content">
      <!-- Populated by JS -->
    </div>
  </main>

  <!-- ═══════════ MARKDOWN MODAL ═══════════ -->
  <div class="modal-overlay" id="mdModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Harvested Markdown</h3>
        <button class="modal-close" id="mdClose">&times;</button>
      </div>
      <div class="modal-body">
        <textarea id="mdOutput" readonly></textarea>
      </div>
      <div class="modal-footer">
        <button class="modal-btn" id="mdCopy">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy to Clipboard
        </button>
        <button class="modal-btn secondary" id="mdDownload">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download .md
        </button>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
