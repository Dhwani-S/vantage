<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vantage</title>
  <link rel="icon" type="image/svg+xml" href="../icons/favicon.svg" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="logo">
        <span class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m9 11-6 6v3h9l3-3"/><path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/></svg>
        </span>
        <div>
          <h1>Vantage</h1>
          <p class="tagline">Collaborative Web Highlighter</p>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
    </div>

    <!-- Highlighting Toggle -->
    <div class="page-toggle" id="pageToggleContainer">
      <div class="toggle-info">
        <span class="toggle-icon" id="toggleIcon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
        <span class="toggle-label" id="toggleLabel">Overlay off</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="pageToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat">
        <span class="stat-value" id="totalHighlights">0</span>
        <span class="stat-label">Annotations</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="totalPages">0</span>
        <span class="stat-label">Pages</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="thisPage">0</span>
        <span class="stat-label">This Page</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="btnHighlight" class="action-btn primary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
        Annotate Selection
      </button>
      <div class="actions-row">
        <button id="btnPageNote" class="action-btn secondary half">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/></svg>
          Page Note
        </button>
        <button id="btnDashboard" class="action-btn secondary half">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
          Dashboard
        </button>
      </div>
    </div>

    <!-- Cloud Pack -->
    <div class="cloud-section">
      <div class="cloud-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
        <span>Shared POV</span>
      </div>

      <!-- Disconnected state -->
      <div id="cloudDisconnected">
        <input type="text" id="firebaseUrl" class="cloud-input" placeholder="Database URL" />
        <div class="cloud-btn-row">
          <button id="btnCreatePack" class="cloud-btn create">Create Room</button>
          <button id="btnShowJoin" class="cloud-btn join">Join Room</button>
        </div>
        <div id="joinFields" class="join-fields hidden">
          <input type="text" id="joinKey" class="cloud-input" placeholder="Room key (CS-XXXX-XXXX)" />
          <button id="btnJoinPack" class="cloud-btn join">Connect</button>
        </div>
      </div>

      <!-- Connected state -->
      <div id="cloudConnected" class="hidden">
        <div class="cloud-status">
          <span class="cloud-dot"></span>
          <span class="cloud-pack-name" id="cloudPackName">&mdash;</span>
          <span class="cloud-role-badge" id="cloudRoleBadge">viewer</span>
        </div>
        <div class="cloud-key-row">
          <code id="cloudPackKey" class="cloud-key" title="Click to copy">&mdash;</code>
          <button id="btnLeavePack" class="cloud-btn leave">Leave</button>
        </div>
        <!-- Your identity -->
        <div class="cloud-identity" id="cloudIdentity"></div>
        <!-- Active viewers -->
        <div class="cloud-viewers" id="cloudViewers">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span id="viewerCount">0</span>
          <span class="viewer-label">online</span>
        </div>
        <div class="viewer-names" id="viewerNames"></div>
        <!-- Role selector (editors only) -->
        <div id="roleSelector" class="role-selector hidden">
          <span class="role-label">Default role:</span>
          <select id="defaultRoleSelect" class="role-select">
            <option value="viewer">Viewer (read only)</option>
            <option value="commentor" selected>Commentor (annotate)</option>
            <option value="editor">Editor (full access)</option>
          </select>
        </div>
      </div>

      <!-- Room History -->
      <div id="roomHistory" class="room-history hidden">
        <div class="history-header">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
          <span>Room History</span>
        </div>
        <div id="roomHistoryList" class="history-list"></div>
      </div>
    </div>

    <!-- Shortcut hint -->
    <div class="shortcut-hint">
      <kbd>Alt</kbd> + <kbd>H</kbd> quick-annotate
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
