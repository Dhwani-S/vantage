<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context Scribe</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="logo">
        <span class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14"/><path d="M4 19h16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </span>
        <div>
          <h1>Context Scribe</h1>
          <p class="tagline">The Sovereign Scholar</p>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>

    <!-- Highlighting Toggle -->
    <div class="page-toggle" id="pageToggleContainer">
      <div class="toggle-info">
        <span class="toggle-icon" id="toggleIcon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <span class="toggle-label" id="toggleLabel">Highlighting off</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="pageToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat">
        <span class="stat-value" id="totalHighlights">0</span>
        <span class="stat-label">Highlights</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="totalPages">0</span>
        <span class="stat-label">Pages</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="thisPage">0</span>
        <span class="stat-label">This Page</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="btnHighlight" class="action-btn primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Highlight Selected Text
      </button>
      <button id="btnDashboard" class="action-btn secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Open Dashboard
      </button>
    </div>

    <!-- Cloud Pack -->
    <div class="cloud-section">
      <div class="cloud-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
        <span>Cloud Pack</span>
      </div>

      <!-- Disconnected state -->
      <div id="cloudDisconnected">
        <input type="text" id="firebaseUrl" class="cloud-input" placeholder="Firebase Database URL" />
        <div class="cloud-btn-row">
          <button id="btnCreatePack" class="cloud-btn create">Create Pack</button>
          <button id="btnShowJoin" class="cloud-btn join">Join Pack</button>
        </div>
        <div id="joinFields" class="join-fields hidden">
          <input type="text" id="joinKey" class="cloud-input" placeholder="Room key (e.g. CS-A1B2-C3D4)" />
          <button id="btnJoinPack" class="cloud-btn join">Connect</button>
        </div>
      </div>

      <!-- Connected state -->
      <div id="cloudConnected" class="hidden">
        <div class="cloud-status">
          <span class="cloud-dot"></span>
          <span class="cloud-pack-name" id="cloudPackName">—</span>
        </div>
        <div class="cloud-key-row">
          <code id="cloudPackKey" class="cloud-key" title="Click to copy">—</code>
          <button id="btnLeavePack" class="cloud-btn leave">Leave</button>
        </div>
      </div>
    </div>

    <!-- Shortcut hint -->
    <div class="shortcut-hint">
      <kbd>Alt</kbd> + <kbd>H</kbd> to quick-highlight
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
